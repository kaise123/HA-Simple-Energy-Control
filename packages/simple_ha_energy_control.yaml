# simple_ha_energy_control.yaml
#
# Simple HA Energy Control — Home Assistant Package
# https://github.com/kaise123/HA-Simple-Energy-Control
#
# This is a native Home Assistant package file. Drop it into your HA
# "packages/" directory and it will automatically configure all helpers,
# template sensors, and automations required by Simple HA Energy Control.
#
# PREREQUISITES (install and configure these separately before using this package):
#
#   1. Amber Electric integration — provides:
#        sensor.amber_express_home_general_price
#        sensor.amber_express_home_feed_in_price
#
#   2. AlphaESS Modbus integration (hillviewlodge.ie/alphaess) — provides:
#        input_select.alphaess_helper_dispatch_mode
#        input_number.alphaess_helper_dispatch_duration
#        input_boolean.alphaess_helper_dispatch
#        input_button.alphaess_helper_dispatch_reset_full
#        sensor.alphaess_soc_battery
#
#   3. Mobile app notification service:
#        notify.mobile_app_phone
#        (replace with your actual device notify service if different)
#
# INSTALLATION:
#   1. Enable HA packages in your configuration.yaml (once only):
#
#        homeassistant:
#          packages: !include_dir_named packages
#
#   2. Copy this file into your HA config "packages/" folder.
#   3. Restart Home Assistant.
#   4. Configure the Lovelace dashboard manually (see dashboard.yaml).

# ---------------------------------------------------------------------------
# TEMPLATE SENSORS
# Scans the Amber forecast attribute arrays to find the min/max price
# expected in the next 1–12 hours. Used by the predictive hold logic.
# ---------------------------------------------------------------------------
template:
  - sensor:
      # Maximum expected feed-in (export) price over the next 1–12 hours.
      # A high value here triggers the predictive export hold, preserving
      # battery capacity for the upcoming price spike.
      - name: "Amber Max Export Forecast 12h"
        unique_id: amber_max_export_forecast_12h
        unit_of_measurement: "$/kWh"
        icon: mdi:chart-line-variant
        state: >
          {% set fcast = state_attr('sensor.amber_express_home_feed_in_price', 'forecast') %}
          {% if fcast %}
            {% set start = (now() + timedelta(hours=1)).isoformat() %}
            {% set end = (now() + timedelta(hours=12)).isoformat() %}
            {% set future = fcast | selectattr('time', '>', start) | selectattr('time', '<=', end) | map(attribute='value') | list %}
            {{ future | max | float(0) if future else 0 }}
          {% else %}
            0
          {% endif %}

      # Minimum expected general (import) price over the next 1–12 hours.
      # A low value here triggers the predictive import hold, waiting for
      # the upcoming cheap period before force-charging.
      - name: "Amber Min Import Forecast 12h"
        unique_id: amber_min_import_forecast_12h
        unit_of_measurement: "$/kWh"
        icon: mdi:chart-line-variant
        state: >
          {% set fcast = state_attr('sensor.amber_express_home_general_price', 'forecast') %}
          {% if fcast %}
            {% set start = (now() + timedelta(hours=1)).isoformat() %}
            {% set end = (now() + timedelta(hours=12)).isoformat() %}
            {% set future = fcast | selectattr('time', '>', start) | selectattr('time', '<=', end) | map(attribute='value') | list %}
            {{ future | min | float(0) if future else 0 }}
          {% else %}
            0
          {% endif %}

# ---------------------------------------------------------------------------
# INPUT NUMBERS — Price & SOC thresholds
# Configure these via the dashboard after installation.
# ---------------------------------------------------------------------------
input_number:

  # --- EXPORT TIERS (Selling to Grid) ------------------------------------
  # Tier 1: requires the highest SOC — activates at the most aggressive price
  amber_export_soc_1:
    name: Export Tier 1 Minimum SOC
    min: 0
    max: 100
    step: 1
    mode: box
    unit_of_measurement: "%"
  amber_export_price_1:
    name: Export Tier 1 Minimum Price
    min: -5
    max: 20
    step: 0.01
    mode: box
    unit_of_measurement: "$/kWh"

  # Tier 2: mid SOC requirement, mid price threshold
  amber_export_soc_2:
    name: Export Tier 2 Minimum SOC
    min: 0
    max: 100
    step: 1
    mode: box
    unit_of_measurement: "%"
  amber_export_price_2:
    name: Export Tier 2 Minimum Price
    min: -5
    max: 20
    step: 0.01
    mode: box
    unit_of_measurement: "$/kWh"

  # Tier 3: lowest SOC requirement, lowest price threshold
  amber_export_soc_3:
    name: Export Tier 3 Minimum SOC
    min: 0
    max: 100
    step: 1
    mode: box
    unit_of_measurement: "%"
  amber_export_price_3:
    name: Export Tier 3 Minimum Price
    min: -5
    max: 20
    step: 0.01
    mode: box
    unit_of_measurement: "$/kWh"

  # --- IMPORT TIERS (Charging from Grid) ---------------------------------
  # Tier 1: triggers at the lowest SOC and cheapest import price
  amber_import_soc_1:
    name: Import Tier 1 Maximum SOC
    min: 0
    max: 100
    step: 1
    mode: box
    unit_of_measurement: "%"
  amber_import_price_1:
    name: Import Tier 1 Maximum Price
    min: -5
    max: 20
    step: 0.01
    mode: box
    unit_of_measurement: "$/kWh"

  # Tier 2: mid SOC and slightly higher price ceiling
  amber_import_soc_2:
    name: Import Tier 2 Maximum SOC
    min: 0
    max: 100
    step: 1
    mode: box
    unit_of_measurement: "%"
  amber_import_price_2:
    name: Import Tier 2 Maximum Price
    min: -5
    max: 20
    step: 0.01
    mode: box
    unit_of_measurement: "$/kWh"

  # --- HYSTERESIS --------------------------------------------------------
  # Adds a buffer around price thresholds to prevent rapid mode toggling
  # when live prices fluctuate near a configured threshold.
  amber_price_hysteresis:
    name: Price Hysteresis Buffer
    min: 0
    max: 1
    step: 0.01
    mode: box
    unit_of_measurement: "$/kWh"

  # --- PREDICTIVE THRESHOLDS --------------------------------------------
  # Export hold: blocks exporting when a forecasted future spike exceeds this value,
  # preserving battery capacity for the higher-value event.
  amber_export_forecast_threshold:
    name: Hold Exports if Future Spike Exceeds
    min: 0
    max: 20
    step: 0.01
    mode: box
    unit_of_measurement: "$/kWh"

  # Import hold: blocks force-charging when a future cheap period is forecast
  # below this value, waiting for the lower cost window instead.
  amber_import_forecast_threshold:
    name: Hold Imports if Future Drop is Below
    min: -5
    max: 20
    step: 0.01
    mode: box
    unit_of_measurement: "$/kWh"

  # --- ABSOLUTE OVERRIDES -----------------------------------------------
  # Releases a predictive export hold when the live price exceeds this ceiling,
  # ensuring extreme spot prices are never missed.
  amber_export_absolute_override:
    name: Release Export Hold if Live Price >
    min: 0
    max: 20
    step: 0.01
    mode: box
    unit_of_measurement: "$/kWh"

  # Releases a predictive import hold when the live price falls below this floor,
  # ensuring extreme negative prices are always captured.
  amber_import_absolute_override:
    name: Release Import Hold if Live Price <
    min: -5
    max: 20
    step: 0.01
    mode: box
    unit_of_measurement: "$/kWh"

# ---------------------------------------------------------------------------
# INPUT BOOLEANS — Feature toggles
# ---------------------------------------------------------------------------
input_boolean:

  # Master on/off — disabling returns the inverter to standard self-consumption
  amber_automation_enabled:
    name: Master Automation Switch
    icon: mdi:power

  # Per-tier export enables
  amber_export_tier_1_enabled:
    name: Enable Export Tier 1
    icon: mdi:numeric-1-circle
  amber_export_tier_2_enabled:
    name: Enable Export Tier 2
    icon: mdi:numeric-2-circle
  amber_export_tier_3_enabled:
    name: Enable Export Tier 3
    icon: mdi:numeric-3-circle

  # Per-tier import enables
  amber_import_tier_1_enabled:
    name: Enable Import Tier 1
    icon: mdi:numeric-1-circle
  amber_import_tier_2_enabled:
    name: Enable Import Tier 2
    icon: mdi:numeric-2-circle

  # Predictive hold toggles — suspend normal tier rules when a future
  # price event is anticipated in the 12-hour Amber forecast
  amber_predictive_export_hold:
    name: Enable Predictive Export Hold
    icon: mdi:history
  amber_predictive_import_hold:
    name: Enable Predictive Import Hold
    icon: mdi:history

# ---------------------------------------------------------------------------
# INPUT TEXT — Status display
# ---------------------------------------------------------------------------
input_text:
  # Displays the currently active automation state on the dashboard.
  # Updated on every automation run; used to suppress duplicate notifications.
  amber_active_tier_status:
    name: Current Automation Status
    initial: "🟢 Idle (Normal Mode)"

# ---------------------------------------------------------------------------
# AUTOMATION
# ---------------------------------------------------------------------------
automation:
  - id: 'alphaess_amber_optimization_tiered'
    alias: "Simple HA Energy Control: AlphaESS Amber Dispatch"
    description: >
      Maximise Amber Electric profits with multi-tier SOC rules, predictive
      12-hour holds, and hysteresis. On import triggers, activates
      Optimise Consumption (Mode 6) for full-power grid force-charging.
      On export triggers, activates Maximise Output (Mode 4).
      Runs on every price tick or SOC change.
    mode: single

    trigger:
      - platform: state
        entity_id:
          - sensor.amber_express_home_general_price
          - sensor.amber_express_home_feed_in_price
          - sensor.alphaess_soc_battery
          - input_boolean.amber_automation_enabled

    action:
      - variables:
          # 1. Fetch current states
          soc: "{{ states('sensor.alphaess_soc_battery') | float(0) }}"
          import_price: "{{ states('sensor.amber_express_home_general_price') | float(0) }}"
          export_price: "{{ states('sensor.amber_express_home_feed_in_price') | float(0) }}"
          hysteresis: "{{ states('input_number.amber_price_hysteresis') | float(0) }}"
          enabled: "{{ is_state('input_boolean.amber_automation_enabled', 'on') }}"
          current_status: "{{ states('input_text.amber_active_tier_status') }}"

          # 2. Predictive Hold Logic (with absolute overrides)
          # Export hold: true when a future spike exceeds threshold AND
          # the live price hasn't already breached the absolute override ceiling.
          pred_exp_active: >
            {{ is_state('input_boolean.amber_predictive_export_hold', 'on')
               and states('sensor.amber_max_export_forecast_12h')|float(0) >= states('input_number.amber_export_forecast_threshold')|float(99)
               and export_price < states('input_number.amber_export_absolute_override')|float(99) }}

          # Import hold: true when a future cheap period is forecast AND
          # the live price hasn't already fallen below the absolute override floor.
          pred_imp_active: >
            {{ is_state('input_boolean.amber_predictive_import_hold', 'on')
               and states('sensor.amber_min_import_forecast_12h')|float(0) <= states('input_number.amber_import_forecast_threshold')|float(-99)
               and import_price > states('input_number.amber_import_absolute_override')|float(-99) }}

          # 3. Evaluate which tier rules match (only when predictive holds are inactive)
          t1_exp: "{{ enabled and not pred_exp_active and is_state('input_boolean.amber_export_tier_1_enabled', 'on') and soc >= states('input_number.amber_export_soc_1')|float(100) and export_price >= (states('input_number.amber_export_price_1')|float(99) + hysteresis) }}"
          t2_exp: "{{ enabled and not pred_exp_active and is_state('input_boolean.amber_export_tier_2_enabled', 'on') and soc >= states('input_number.amber_export_soc_2')|float(100) and export_price >= (states('input_number.amber_export_price_2')|float(99) + hysteresis) }}"
          t3_exp: "{{ enabled and not pred_exp_active and is_state('input_boolean.amber_export_tier_3_enabled', 'on') and soc >= states('input_number.amber_export_soc_3')|float(100) and export_price >= (states('input_number.amber_export_price_3')|float(99) + hysteresis) }}"

          t1_imp: "{{ enabled and not pred_imp_active and is_state('input_boolean.amber_import_tier_1_enabled', 'on') and soc <= states('input_number.amber_import_soc_1')|float(0) and import_price <= (states('input_number.amber_import_price_1')|float(-99) - hysteresis) }}"
          t2_imp: "{{ enabled and not pred_imp_active and is_state('input_boolean.amber_import_tier_2_enabled', 'on') and soc <= states('input_number.amber_import_soc_2')|float(0) and import_price <= (states('input_number.amber_import_price_2')|float(-99) - hysteresis) }}"

          # 4. Determine the single active action (evaluated in priority order)
          active_action: >
            {% if not enabled %} disabled
            {% elif pred_exp_active and (export_price >= states('input_number.amber_export_price_3')|float(99)) %} holding_export
            {% elif pred_imp_active and (import_price <= states('input_number.amber_import_price_1')|float(-99)) %} holding_import
            {% elif t1_exp %} export_1
            {% elif t2_exp %} export_2
            {% elif t3_exp %} export_3
            {% elif t1_imp %} import_1
            {% elif t2_imp %} import_2
            {% else %} idle {% endif %}

          # 5. Human-readable status string for the dashboard indicator
          new_status_text: >
            {% if not enabled %} 🔴 Automation Disabled
            {% elif active_action == 'holding_export' %} 🛑 Holding Exports (Spike Forecasted!)
            {% elif active_action == 'holding_import' %} 🛑 Holding Imports (Drop Forecasted!)
            {% elif t1_exp %} 📤 Exporting (Tier 1)
            {% elif t2_exp %} 📤 Exporting (Tier 2)
            {% elif t3_exp %} 📤 Exporting (Tier 3)
            {% elif t1_imp %} 📥 Importing (Tier 1)
            {% elif t2_imp %} 📥 Importing (Tier 2)
            {% else %} 🟢 Idle (Normal Mode) {% endif %}

      # Update dashboard status indicator on every run
      - service: input_text.set_value
        target:
          entity_id: input_text.amber_active_tier_status
        data:
          value: "{{ new_status_text }}"

      - choose:
          # --- EXPORT TRIGGER ---
          # Activates Maximise Output (Mode 4) for 30 min when an export
          # tier condition is met and the battery has charge to give.
          - conditions:
              - condition: template
                value_template: "{{ active_action in ['export_1', 'export_2', 'export_3'] }}"
              - condition: template
                value_template: "{{ soc > 10 }}"
            sequence:
              - if:
                  - condition: template
                    value_template: "{{ current_status != new_status_text }}"
                then:
                  - service: notify.mobile_app_phone
                    data:
                      title: "📈 Amber Export Initiated!"
                      message: "{{ new_status_text }} - Feed-in is ${{ export_price }}/kWh (SOC: {{ soc }}%)."
              - service: input_select.select_option
                target:
                  entity_id: input_select.alphaess_helper_dispatch_mode
                data:
                  option: "Maximise Output (4)"
              - service: input_number.set_value
                target:
                  entity_id: input_number.alphaess_helper_dispatch_duration
                data:
                  value: 30
              - service: input_boolean.turn_on
                target:
                  entity_id: input_boolean.alphaess_helper_dispatch

          # --- IMPORT TRIGGER ---
          # Activates Optimise Consumption (Mode 6) for 30 min when an import
          # tier condition is met and the battery is not already full.
          # Mode 6: force-charges the battery at full power from the grid;
          # house load served by grid; PV output also contributes.
          - conditions:
              - condition: template
                value_template: "{{ active_action in ['import_1', 'import_2'] }}"
              - condition: template
                value_template: "{{ soc < 98 }}"
            sequence:
              - if:
                  - condition: template
                    value_template: "{{ current_status != new_status_text }}"
                then:
                  - service: notify.mobile_app_phone
                    data:
                      title: "📉 Amber Import Initiated!"
                      message: "{{ new_status_text }} - Import is ${{ import_price }}/kWh (SOC: {{ soc }}%)."
              - service: input_select.select_option
                target:
                  entity_id: input_select.alphaess_helper_dispatch_mode
                data:
                  option: "Optimise Consumption (6)"
              - service: input_number.set_value
                target:
                  entity_id: input_number.alphaess_helper_dispatch_duration
                data:
                  value: 30
              - service: input_boolean.turn_on
                target:
                  entity_id: input_boolean.alphaess_helper_dispatch

        # --- IDLE / DISABLED / HOLDING (RETURN TO NORMAL) ---
        # Resets the inverter to standard self-consumption via the reset button.
        default:
          - if:
              - condition: template
                value_template: "{{ current_status != new_status_text and new_status_text == '🟢 Idle (Normal Mode)' }}"
            then:
              - service: notify.mobile_app_phone
                data:
                  title: "🔄 Simple HA Energy Control Reset"
                  message: "Prices have normalised. Returning to standard self-consumption."
          - service: input_button.press
            target:
              entity_id: input_button.alphaess_helper_dispatch_reset_full
