# configuration.yaml  [LEGACY REFERENCE — do not copy manually]
#
# Simple HA Energy Control
# This file is kept for reference only. The canonical, up-to-date version of
# these helpers and template sensors is now part of the HA package:
#   packages/simple_ha_energy_control.yaml
#
# Copy that file into your HA packages/ folder instead. See README.md.
#
# NOTE: This file contained duplicate input_number entries for the predictive
# threshold helpers — those have been de-duplicated in the package.
#
template:
  - sensor:
      # Scans the forecast array between 1 and 12 hours ahead (ignoring current hour)
      - name: "Amber Max Export Forecast 12h"
        unit_of_measurement: "$/kWh"
        icon: mdi:chart-line-variant
        state: >
          {% set fcast = state_attr('sensor.amber_express_home_feed_in_price', 'forecast') %}
          {% if fcast %}
            {% set start = (now() + timedelta(hours=1)).isoformat() %}
            {% set end = (now() + timedelta(hours=12)).isoformat() %}
            {% set future = fcast | selectattr('time', '>', start) | selectattr('time', '<=', end) | map(attribute='value') | list %}
            {{ future | max | float(0) if future else 0 }}
          {% else %}
            0
          {% endif %}
          
      # Scans the forecast array between 1 and 12 hours ahead (ignoring current hour)
      - name: "Amber Min Import Forecast 12h"
        unit_of_measurement: "$/kWh"
        icon: mdi:chart-line-variant
        state: >
          {% set fcast = state_attr('sensor.amber_express_home_general_price', 'forecast') %}
          {% if fcast %}
            {% set start = (now() + timedelta(hours=1)).isoformat() %}
            {% set end = (now() + timedelta(hours=12)).isoformat() %}
            {% set future = fcast | selectattr('time', '>', start) | selectattr('time', '<=', end) | map(attribute='value') | list %}
            {{ future | min | float(0) if future else 0 }}
          {% else %}
            0
          {% endif %}
input_number:
# --- EXPORT TIERS (Selling to Grid) ---
  # Tier 1 (Highest SOC)
  amber_export_soc_1:
    name: Export Tier 1 Minimum SOC
    min: 0
    max: 100
    mode: box
    unit_of_measurement: "%"
  amber_export_price_1:
    name: Export Tier 1 Minimum Price
    min: -5
    max: 20
    step: 0.01
    mode: box
    unit_of_measurement: "$/kWh"

  # Tier 2 (Mid SOC)
  amber_export_soc_2:
    name: Export Tier 2 Minimum SOC
    min: 0
    max: 100
    mode: box
    unit_of_measurement: "%"
  amber_export_price_2:
    name: Export Tier 2 Minimum Price
    min: -5
    max: 20
    step: 0.01
    mode: box
    unit_of_measurement: "$/kWh"

  # Tier 3 (Low SOC)
  amber_export_soc_3:
    name: Export Tier 3 Minimum SOC
    min: 0
    max: 100
    mode: box
    unit_of_measurement: "%"
  amber_export_price_3:
    name: Export Tier 3 Minimum Price
    min: -5
    max: 20
    step: 0.01
    mode: box
    unit_of_measurement: "$/kWh"

  # --- IMPORT TIERS (Charging from Grid) ---
  # Tier 1 (Lowest SOC)
  amber_import_soc_1:
    name: Import Tier 1 Maximum SOC
    min: 0
    max: 100
    mode: box
    unit_of_measurement: "%"
  amber_import_price_1:
    name: Import Tier 1 Maximum Price
    min: -5
    max: 20
    step: 0.01
    mode: box
    unit_of_measurement: "$/kWh"

  # Tier 2 (Mid SOC)
  amber_import_soc_2:
    name: Import Tier 2 Maximum SOC
    min: 0
    max: 100
    mode: box
    unit_of_measurement: "%"
  amber_import_price_2:
    name: Import Tier 2 Maximum Price
    min: -5
    max: 20
    step: 0.01
    mode: box
    unit_of_measurement: "$/kWh"

  # --- HYSTERESIS ---
  amber_price_hysteresis:
    name: Price Hysteresis Buffer
    min: 0
    max: 1
    step: 0.01
    mode: box
    unit_of_measurement: "$/kWh"
# --- PREDICTIVE THRESHOLDS ---
  amber_export_forecast_threshold:
    name: Hold Exports if Spike Exceeds
    min: 0
    max: 20
    step: 0.01
    mode: box
    unit_of_measurement: "$/kWh"
  amber_import_forecast_threshold:
    name: Hold Imports if Drop is Below
    min: -5
    max: 20
    step: 0.01
    mode: box
    unit_of_measurement: "$/kWh"

# --- PREDICTIVE THRESHOLDS ---
  amber_export_forecast_threshold:
    name: Hold Exports if Future Spike Exceeds
    min: 0
    max: 20
    step: 0.01
    mode: box
    unit_of_measurement: "$/kWh"
  amber_import_forecast_threshold:
    name: Hold Imports if Future Drop is Below
    min: -5
    max: 20
    step: 0.01
    mode: box
    unit_of_measurement: "$/kWh"

  # --- ABSOLUTE OVERRIDES ---
  amber_export_absolute_override:
    name: Release Export Hold if Live Price >
    min: 0
    max: 20
    step: 0.01
    mode: box
    unit_of_measurement: "$/kWh"
  amber_import_absolute_override:
    name: Release Import Hold if Live Price <
    min: -5
    max: 20
    step: 0.01
    mode: box
    unit_of_measurement: "$/kWh"

input_boolean:
  # --- MASTER SWITCH ---
  amber_automation_enabled:
    name: Master Automation Switch
    icon: mdi:power

  # --- INDIVIDUAL TIER SWITCHES ---
  amber_export_tier_1_enabled:
    name: Enable Export Tier 1
  amber_export_tier_2_enabled:
    name: Enable Export Tier 2
  amber_export_tier_3_enabled:
    name: Enable Export Tier 3
    
  amber_import_tier_1_enabled:
    name: Enable Import Tier 1
  amber_import_tier_2_enabled:
    name: Enable Import Tier 2
# --- PREDICTIVE TOGGLES ---
  amber_predictive_export_hold:
    name: Enable Predictive Export Hold
    icon: mdi:history
  amber_predictive_import_hold:
    name: Enable Predictive Import Hold
    icon: mdi:history
input_text:
  # --- ACTIVE STATUS INDICATOR ---
  amber_active_tier_status:
    name: Current Automation Status
    initial: "🟢 Idle (Normal Mode)"
